services:

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-omnibioai}
      MYSQL_DATABASE: ${MYSQL_DEFAULT_DB:-omnibioai}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ${DB_INIT_DIR}:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 5s
      timeout: 3s
      retries: 30

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 30

  toolserver:
    image: ghcr.io/man4ish/omnibioai-toolserver:latest
    ports:
      - "${HOST_IP:-0.0.0.0}:9090:9090"
    environment:
      PYTHONUNBUFFERED: "1"
    volumes:
      - ${WORKSPACE_HOST}:/workspace
    depends_on:
      mysql:
        condition: service_healthy

  tes:
    image: ghcr.io/man4ish/omnibioai-tes:latest
    ports:
      - "${HOST_IP:-0.0.0.0}:8081:8081"
      - "${HOST_IP:-0.0.0.0}:5177:5177"
    environment:
      HOST: 0.0.0.0
      PORT: "8081"
      TOOLSERVER_BASE_URL: http://toolserver:9090
    volumes:
      - ${WORK_DIR}:/workspace
      - ${HOME}/.kube:/root/.kube:ro
      - ${HOME}/.minikube:/root/.minikube:ro
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      toolserver:
        condition: service_started

  model-registry:
    image: ghcr.io/man4ish/omnibioai-model-registry:latest
    ports:
      - "${HOST_IP:-0.0.0.0}:8095:8095"
      - "${HOST_IP:-0.0.0.0}:5176:5176"
    environment:
      HOST: 0.0.0.0
      PORT: "8095"
      DB_HOST: mysql
      DB_PORT: "3306"
      DB_USER: root
      DB_PASSWORD: ${MYSQL_ROOT_PASSWORD:-omnibioai}
      DB_NAME: model_registry
      OMNIBIOAI_MODEL_REGISTRY_ROOT: /registry
    volumes:
      - ${DATA_DIR}/model_registry:/registry
    depends_on:
      mysql:
        condition: service_healthy

  lims:
    image: ghcr.io/man4ish/omnibioai-lims:latest
    ports:
      - "7000:7000"
    environment:
      DJANGO_SETTINGS_MODULE: lab_data_manager.settings
      MYSQL_HOST: mysql
      MYSQL_PORT: "3306"
      MYSQL_DATABASE: limsdb
      MYSQL_USER: root
      MYSQL_PASSWORD: ${MYSQL_ROOT_PASSWORD:-omnibioai}
      DJANGO_SECRET_KEY: ${LIMSX_DJANGO_SECRET_KEY:-omnibioai-studio-secret}
      DJANGO_ALLOWED_HOSTS: "127.0.0.1,localhost,lims,0.0.0.0,*"
    depends_on:
      mysql:
        condition: service_healthy
    command: ["bash", "-lc", "python manage.py migrate && python manage.py ensure_admin && python manage.py runserver 0.0.0.0:7000"]

  ollama:
    image: ollama/ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

  rag:
    image: ghcr.io/man4ish/omnibioai-rag:latest
    ports:
      - "${HOST_IP:-0.0.0.0}:8090:8096"
      - "${HOST_IP:-0.0.0.0}:5175:5175"
    environment:
      HOST: 0.0.0.0
      PORT: "8096"
      OLLAMA_BASE_URL: http://ollama:11434
    depends_on:
      - ollama

  workbench:
    image: ghcr.io/man4ish/omnibioai-app:latest
    ports:
      - "${HOST_IP:-0.0.0.0}:8000:8000"
    environment:
      DEBUG: "1"
      DJANGO_SETTINGS_MODULE: omnibioai.settings
      DB_HOST: mysql
      DB_PORT: "3306"
      DB_NAME: omnibioai
      DB_USER: root
      DB_PASSWORD: ${MYSQL_ROOT_PASSWORD:-omnibioai}
      REDIS_HOST: redis
      REDIS_PORT: "6380"
      CELERY_BROKER_URL: redis://redis:6379/1
      TES_BASE_URL: http://tes:8081
      OLLAMA_BASE_URL: http://ollama:11434
      TOOLSERVER_BASE_URL: http://toolserver:9090
      MODEL_REGISTRY_BASE_URL: http://model-registry:8095
      RAG_BASE_URL: http://rag:8096
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    volumes:
      - ${WORKSPACE_HOST}:/workspace
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      tes:
        condition: service_started
      toolserver:
        condition: service_started
      model-registry:
        condition: service_started
    command: ["bash", "-lc", "python manage.py migrate || (python manage.py migrate --fake-initial && python manage.py migrate) && python manage.py runserver 0.0.0.0:8000 --noreload"]

  celery-worker:
    image: ghcr.io/man4ish/omnibioai-app:latest
    environment:
      DEBUG: "1"
      DJANGO_SETTINGS_MODULE: omnibioai.settings
      DB_HOST: mysql
      DB_PORT: "3306"
      DB_NAME: omnibioai
      DB_USER: root
      DB_PASSWORD: ${MYSQL_ROOT_PASSWORD:-omnibioai}
      REDIS_HOST: redis
      REDIS_PORT: "6380"
      CELERY_BROKER_URL: redis://redis:6379/1
      TES_BASE_URL: http://tes:8081
      TOOLSERVER_BASE_URL: http://toolserver:9090
      MODEL_REGISTRY_BASE_URL: http://model-registry:8095
      RAG_BASE_URL: http://rag:8096
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    volumes:
      - ${WORKSPACE_HOST}:/workspace
    depends_on:
      workbench:
        condition: service_started
    command: ["bash", "-lc", "celery -A omnibioai worker -l info"]

  control-center:
    image: ghcr.io/man4ish/omnibioai-control-center:latest
    ports:
      - "${HOST_IP:-0.0.0.0}:7070:7070"
    environment:
      WORKSPACE_ROOT: /workspace
      OMNIBIOAI_BASE: /workspace/omnibioai
      TOOL_IMAGES_BASE: /workspace/omnibioai-tool-images
    volumes:
      - ${WORK_DIR}:/workspace
      - /var/run/docker.sock:/var/run/docker.sock
      - /usr/bin/docker:/usr/bin/docker:ro
    depends_on:
      - workbench
      - tes
      - toolserver

  dev-hub:
    image: ghcr.io/man4ish/omnibioai-dev-hub:latest
    ports:
      - "${HOST_IP:-0.0.0.0}:5173:5173"
      - "${HOST_IP:-0.0.0.0}:8082:8082"
    environment:
      PYTHONUNBUFFERED: "1"
      PYTHONPATH: /app
      OLLAMA_URL: http://ollama:11434/api
      OLLAMA_HOST: http://ollama:11434
    depends_on:
      - ollama
    restart: on-failure

  sdk:
    image: ghcr.io/man4ish/omnibioai-sdk:latest
    ports:
      - "${HOST_IP:-0.0.0.0}:5190:5190"
    environment:
      OMNIBIOAI_BASE_URL: http://workbench:8000

  workflow-bundles:
    image: ghcr.io/man4ish/omnibioai-workflow-bundles:latest
    ports:
      - "${HOST_IP:-0.0.0.0}:8098:8098"
      - "${HOST_IP:-0.0.0.0}:5178:5178"
    environment:
      PYTHONUNBUFFERED: "1"
      DB_HOST: mysql
      DB_PORT: "3306"
      DB_NAME: omnibioai
      DB_USER: root
      DB_PASSWORD: ${MYSQL_ROOT_PASSWORD:-omnibioai}
    depends_on:
      mysql:
        condition: service_healthy
    restart: on-failure

  tool-images:
    image: ghcr.io/man4ish/omnibioai-tool-images:latest
    ports:
      - "${HOST_IP:-0.0.0.0}:8097:8097"
      - "${HOST_IP:-0.0.0.0}:5179:5179"
    environment:
      PYTHONUNBUFFERED: "1"
    volumes:
      - ${DATA_DIR}/tool-images/dockerfiles:/app/dockerfiles:ro
      - ${DATA_DIR}/tool-images/sif:/app/sif:ro
    restart: on-failure

  videos:
    image: ghcr.io/man4ish/omnibioai-videos:latest
    ports:
      - "8086:8086"
    volumes:
      - ${VIDEO_DIR}:/videos:ro

  opa:
    image: openpolicyagent/opa:latest
    ports:
      - "8181:8181"
    command: ["run", "--server"]

  # Plugin images (pulled on-demand by TES, not persistent services):
  # ghcr.io/man4ish/omnibioai-plugin-scanpy:latest
  # ghcr.io/man4ish/omnibioai-plugin-fastq-qc:latest
  # ghcr.io/man4ish/omnibioai-plugin-fastq-trimmer:latest
  # ghcr.io/man4ish/omnibioai-plugin-rnaseq-analysis:latest
  # ghcr.io/man4ish/omnibioai-plugin-workflow-runner:latest
  # ghcr.io/man4ish/omnibioai-plugin-marker-identification:latest
  # ghcr.io/man4ish/omnibioai-plugin-phenotype-association:latest
  # ghcr.io/man4ish/omnibioai-plugin-variant-annotation:latest

volumes:
  mysql_data:
  redis_data:
  ollama_data:
