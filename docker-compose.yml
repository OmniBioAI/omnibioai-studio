services:

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-omnibioai}
      MYSQL_DATABASE: ${MYSQL_DEFAULT_DB:-omnibioai}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ${DB_INIT_DIR}:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 5s
      timeout: 3s
      retries: 30

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 30

  toolserver:
    image: ghcr.io/man4ish/omnibioai-toolserver:latest
    ports:
      - "${HOST_IP:-0.0.0.0}:9090:9090"
    environment:
      PYTHONUNBUFFERED: "1"
      IAM_URL: http://auth-service:8001
      AUDIT_URL: http://security-audit:8004
    volumes:
      - ${WORKSPACE_HOST}:/workspace
    depends_on:
      mysql:
        condition: service_healthy

  tes:
    image: omnibioai-tes-local
    build:
      context: /home/manish/Desktop/machine/omnibioai-tes
      dockerfile: Dockerfile.new
      target: backend
    ports:
      - "${HOST_IP:-0.0.0.0}:8081:8081"
      - "${HOST_IP:-0.0.0.0}:5177:5177"
    environment:
      HOST: 0.0.0.0
      PORT: "8081"
      PATH: /usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin:/usr/bin/docker
      DOCKER_HOST: unix:///var/run/docker.sock
      TOOLSERVER_BASE_URL: http://toolserver:9090
      TES_TOOLS: /workspace/configs/tools.example.yaml
      TES_SERVERS: /workspace/configs/servers.example.yaml
      TMPDIR: /tmp/omnibioai_tes_runs
      IAM_URL: http://auth-service:8001
      POLICY_URL: http://policy-engine:8002
      HPC_POLICY_URL: http://hpc-policy-engine:8003
      AUDIT_URL: http://security-audit:8004
      REDIS_URL: redis://redis:6379
      OMNIBIOAI_EXTRA_MOUNTS: /usr/bin/docker:/usr/bin/singularity:/usr/bin/unsquashfs:/usr/bin/squashfuse:/usr/bin/fusermount:/usr/bin/fusermount3:/lib/aarch64-linux-gnu/libseccomp.so.2:/lib/aarch64-linux-gnu/liblzo2.so.2:/lib/aarch64-linux-gnu/liblzo2.so.2.0.0:/lib/aarch64-linux-gnu/libfuse3.so.3:/lib/aarch64-linux-gnu/libfuse3.so.3.14.0:/etc/singularity:/usr/lib/aarch64-linux-gnu/singularity:/var/lib/singularity:/home/manish/Desktop/machine/omnibioai-tool-images/sif:/home/manish/Desktop/machine/omnibioai
      SINGULARITY_CACHEDIR: /tmp/singularity_cache
      SINGULARITY_TMPDIR: /tmp/singularity_tmp
    volumes:
      - /home/manish/Desktop/machine/omnibioai-tes:/workspace
      - /var/run/docker.sock:/var/run/docker.sock
      - /usr/bin/docker:/usr/bin/docker:ro
      - /usr/bin/singularity:/usr/bin/singularity:ro
      - /usr/bin/unsquashfs:/usr/bin/unsquashfs:ro
      - /usr/bin/squashfuse:/usr/bin/squashfuse:ro
      - /usr/bin/fusermount:/usr/bin/fusermount:ro
      - /usr/bin/fusermount3:/usr/bin/fusermount3:ro
      - /lib/aarch64-linux-gnu/libseccomp.so.2:/lib/aarch64-linux-gnu/libseccomp.so.2:ro
      - /lib/aarch64-linux-gnu/liblzo2.so.2:/lib/aarch64-linux-gnu/liblzo2.so.2:ro
      - /lib/aarch64-linux-gnu/liblzo2.so.2.0.0:/lib/aarch64-linux-gnu/liblzo2.so.2.0.0:ro
      - /lib/aarch64-linux-gnu/libfuse3.so.3:/lib/aarch64-linux-gnu/libfuse3.so.3:ro
      - /lib/aarch64-linux-gnu/libfuse3.so.3.14.0:/lib/aarch64-linux-gnu/libfuse3.so.3.14.0:ro
      - /usr/lib/aarch64-linux-gnu/singularity:/usr/lib/aarch64-linux-gnu/singularity:ro
      - /var/lib/singularity:/var/lib/singularity:rw
      - /etc/singularity:/etc/singularity:ro
      - /home/manish/Desktop/machine/omnibioai-workflow-bundles:/home/manish/Desktop/machine/omnibioai-workflow-bundles:ro
      - /home/manish/Desktop/machine/omnibioai:/home/manish/Desktop/machine/omnibioai:rw
      - /home/manish/Desktop/machine/omnibioai-tool-images:/home/manish/Desktop/machine/omnibioai-tool-images:ro
      - ${DATA_DIR}/tool-images/sif:/sif:ro
    command:
      - bash
      - -lc
      - |
        service nginx start && \
        omnibioai-tes serve \
          --host 0.0.0.0 \
          --port 8081 \
          --tools /workspace/configs/tools.example.yaml \
          --servers /workspace/configs/servers.example.yaml
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      toolserver:
        condition: service_started

  model-registry:
    build:
      context: /home/manish/Desktop/machine/omnibioai-model-registry
      dockerfile: Dockerfile.new
      target: backend
    # image: ghcr.io/man4ish/omnibioai-model-registry:latest
    ports:
      - "${HOST_IP:-0.0.0.0}:8095:8095"
      - "${HOST_IP:-0.0.0.0}:5176:5176"
    environment:
      HOST: 0.0.0.0
      PORT: "8095"
      DB_HOST: mysql
      DB_PORT: "3306"
      DB_USER: root
      DB_PASSWORD: ${MYSQL_ROOT_PASSWORD:-omnibioai}
      DB_NAME: model_registry
      OMNIBIOAI_MODEL_REGISTRY_ROOT: /registry
    volumes:
      - /home/manish/Desktop/machine/data/local_registry/model_registry:/registry
    depends_on:
      mysql:
        condition: service_healthy

  lims:
    build:
      context: /home/manish/Desktop/machine/omnibioai-lims
      dockerfile: Dockerfile.new
      target: backend
    image: omnibioai-lims-local
    ports:
      - "7000:7000"
    environment:
      DJANGO_SETTINGS_MODULE: lab_data_manager.settings
      DJANGO_ENV: prod
      DJANGO_DEBUG: "true"
      MYSQL_HOST: mysql
      MYSQL_PORT: "3306"
      MYSQL_DATABASE: limsdb
      MYSQL_USER: root
      MYSQL_PASSWORD: ${MYSQL_ROOT_PASSWORD:-omnibioai}
      DJANGO_SECRET_KEY: ${LIMSX_DJANGO_SECRET_KEY:-omnibioai-studio-secret}
      DJANGO_ALLOWED_HOSTS: "127.0.0.1,localhost,lims,0.0.0.0,*"
      CORS_ALLOWED_ORIGINS: "http://192.168.86.234:7000,http://localhost:7000"
    volumes:
      - /home/manish/Desktop/machine/omnibioai-lims/core:/app/core
    depends_on:
      mysql:
        condition: service_healthy

  ollama:
    image: ollama/ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

  rag:
    build:
      context: /home/manish/Desktop/machine/omnibioai-rag
      dockerfile: Dockerfile.new
      target: backend
    # image: ghcr.io/man4ish/omnibioai-rag:latest
    ports:
      - "${HOST_IP:-0.0.0.0}:8090:8096"
      - "${HOST_IP:-0.0.0.0}:5175:5175"
    environment:
      HOST: 0.0.0.0
      PORT: "8096"
      OLLAMA_BASE_URL: http://ollama:11434
      IAM_URL: http://auth-service:8001
      GATEWAY_URL: http://api-gateway:8080
      RAGBIO_API_KEY: ${RAGBIO_API_KEY}
      RAGBIO_HOST: 0.0.0.0
    depends_on:
      - ollama

  workbench:
    build:
      context: /home/manish/Desktop/machine/omnibioai
      dockerfile: Dockerfile.new
      target: backend
    # image: ghcr.io/man4ish/omnibioai-app:latest
    ports:
      - "${HOST_IP:-0.0.0.0}:8000:8000"
    environment:
      DEBUG: "1"
      DJANGO_SETTINGS_MODULE: omnibioai.settings
      DB_HOST: mysql
      DB_PORT: "3306"
      DB_NAME: omnibioai
      DB_USER: root
      DB_PASSWORD: ${MYSQL_ROOT_PASSWORD:-omnibioai}
      REDIS_HOST: redis
      REDIS_PORT: "6380"
      CELERY_BROKER_URL: redis://redis:6379/1
      TES_BASE_URL: http://tes:8081
      OLLAMA_BASE_URL: http://ollama:11434
      TOOLSERVER_BASE_URL: http://toolserver:9090
      MODEL_REGISTRY_BASE_URL: http://model-registry:8095
      RAG_BASE_URL: http://rag:8096
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OMNIBIOAI_TES_URL: http://tes:8081
      OMNIBIOAI_MYSQL_HOST: mysql
      GATEWAY_URL: http://api-gateway:8080
      RAGBIO_API_KEY: ${RAGBIO_API_KEY}
      RAGBIO_HOST: 0.0.0.0
      OMNIBIOAI_MYSQL_PORT: "3306"
      OMNIBIOAI_MYSQL_USER: root
      OMNIBIOAI_MYSQL_PASSWORD: ${MYSQL_ROOT_PASSWORD:-omnibioai}
      OMNIBIOAI_MYSQL_DB: omnibioai
    volumes:
      - ${WORKSPACE_HOST}:/workspace
      - ${WORK_DIR}/runs:/app/work/runs
      - ${WORK_DIR}/objects:/app/work/objects
      - ${WORK_DIR}/workflow_runner_exec:/app/work/workflow_runner_exec
      - ${WORK_DIR}/pathway_enrichment_runs:/app/work/pathway_enrichment_runs
      - /var/run/docker.sock:/var/run/docker.sock
      - /usr/bin/docker:/usr/bin/docker:ro
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      tes:
        condition: service_started
      toolserver:
        condition: service_started
      model-registry:
        condition: service_started
    command: ["bash", "-lc", "python manage.py migrate || (python manage.py migrate --fake-initial && python manage.py migrate) && python manage.py runserver 0.0.0.0:8000 --noreload"]

  celery-worker:
    build:
      context: /home/manish/Desktop/machine/omnibioai
      dockerfile: Dockerfile.new
      target: backend
    # image: ghcr.io/man4ish/omnibioai-app:latest
    environment:
      DEBUG: "1"
      DJANGO_SETTINGS_MODULE: omnibioai.settings
      DB_HOST: mysql
      DB_PORT: "3306"
      DB_NAME: omnibioai
      DB_USER: root
      DB_PASSWORD: ${MYSQL_ROOT_PASSWORD:-omnibioai}
      REDIS_HOST: redis
      REDIS_PORT: "6380"
      CELERY_BROKER_URL: redis://redis:6379/1
      TES_BASE_URL: http://tes:8081
      TOOLSERVER_BASE_URL: http://toolserver:9090
      MODEL_REGISTRY_BASE_URL: http://model-registry:8095
      RAG_BASE_URL: http://rag:8096
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    volumes:
      - ${WORKSPACE_HOST}:/workspace
      - ${WORK_DIR}/runs:/app/work/runs
      - ${WORK_DIR}/objects:/app/work/objects
      - ${WORK_DIR}/workflow_runner_exec:/app/work/workflow_runner_exec
      - ${WORK_DIR}/pathway_enrichment_runs:/app/work/pathway_enrichment_runs
      - /var/run/docker.sock:/var/run/docker.sock
      - /usr/bin/docker:/usr/bin/docker:ro
    depends_on:
      workbench:
        condition: service_started
    command: ["bash", "-lc", "celery -A omnibioai worker -l info"]

  control-center:
    build:
      context: /home/manish/Desktop/machine/omnibioai-control-center
      dockerfile: Dockerfile.new
      target: backend
    # image: ghcr.io/man4ish/omnibioai-control-center:latest
    ports:
      - "${HOST_IP:-0.0.0.0}:7070:7070"
    environment:
      WORKSPACE_ROOT: /workspace
      OMNIBIOAI_BASE: /workspace/omnibioai
      TOOL_IMAGES_BASE: /workspace/omnibioai-tool-images
    volumes:
      - /home/manish/Desktop/machine:/workspace
      - /var/run/docker.sock:/var/run/docker.sock
      - /usr/bin/docker:/usr/bin/docker:ro
      - /home/manish/Desktop/machine/omnibioai-control-center/backend/src:/app/src
      - /home/manish/Desktop/machine/omnibioai-control-center/frontend/cc-ui/dist:/app/dist
      - /home/manish/Desktop/machine/omnibioai-control-center/config:/config:ro
      - /home/manish/Desktop/machine/omnibioai-tool-images/sif:/workspace/omnibioai-tool-images/sif:ro
    command: >-
      sh -c "/usr/local/bin/pip install -q pytest pytest-cov pandas pytest-django django-environ django-extensions djangorestframework 2>&1 | grep -v '^Requirement' || true &&
      exec /usr/local/bin/uvicorn control_center.main:app --host 0.0.0.0 --port 7070"
    depends_on:
      - workbench
      - tes
      - toolserver

  dev-hub:
    build:
      context: /home/manish/Desktop/machine/omnibioai-dev-hub
      dockerfile: Dockerfile.new
      target: backend
    # image: ghcr.io/man4ish/omnibioai-dev-hub:latest
    ports:
      - "${HOST_IP:-0.0.0.0}:5173:5173"
      - "${HOST_IP:-0.0.0.0}:8082:8082"
    environment:
      PYTHONUNBUFFERED: "1"
      PYTHONPATH: /app
      OLLAMA_URL: http://ollama:11434/api
      OLLAMA_HOST: http://ollama:11434
    depends_on:
      - ollama
    restart: on-failure

  sdk:
    build:
      context: /home/manish/Desktop/machine/omnibioai_sdk
      dockerfile: Dockerfile
    # image: ghcr.io/man4ish/omnibioai-sdk:latest
    ports:
      - "${HOST_IP:-0.0.0.0}:5190:5190"
    environment:
      OMNIBIOAI_BASE_URL: http://workbench:8000

  workflow-bundles:
    build:
      context: /home/manish/Desktop/machine/omnibioai-workflow-bundles
      dockerfile: Dockerfile.new
      target: backend
    # image: ghcr.io/man4ish/omnibioai-workflow-bundles:latest
    ports:
      - "${HOST_IP:-0.0.0.0}:8098:8098"
      - "${HOST_IP:-0.0.0.0}:5178:5178"
    environment:
      PYTHONUNBUFFERED: "1"
      DB_HOST: mysql
      DB_PORT: "3306"
      DB_NAME: omnibioai
      DB_USER: root
      DB_PASSWORD: ${MYSQL_ROOT_PASSWORD:-omnibioai}
    depends_on:
      mysql:
        condition: service_healthy
    restart: on-failure

  tool-images:
    build:
      context: /home/manish/Desktop/machine/omnibioai-tool-images
      dockerfile: Dockerfile.new
      target: backend
    # image: ghcr.io/man4ish/omnibioai-tool-images:latest
    ports:
      - "${HOST_IP:-0.0.0.0}:8097:8097"
      - "${HOST_IP:-0.0.0.0}:5179:5179"
    environment:
      PYTHONUNBUFFERED: "1"
    volumes:
      - /home/manish/Desktop/machine/omnibioai-tool-images/dockerfiles:/app/dockerfiles:ro
      - ${DATA_DIR}/tool-images/sif:/app/sif:ro
      - /home/manish/Desktop/machine/omnibioai-tool-images/build_logs:/app/build_logs:ro
    restart: on-failure

  videos:
    image: ghcr.io/man4ish/omnibioai-videos:latest
    ports:
      - "8086:8086"
    volumes:
      - ${VIDEO_DIR}:/videos:ro

  opa:
    image: openpolicyagent/opa:latest
    ports:
      - "8181:8181"
    command: ["run", "--server"]

  # Plugin images (pulled on-demand by TES, not persistent services):
  # ghcr.io/man4ish/omnibioai-plugin-scanpy:latest
  # ghcr.io/man4ish/omnibioai-plugin-fastq-qc:latest
  # ghcr.io/man4ish/omnibioai-plugin-fastq-trimmer:latest
  # ghcr.io/man4ish/omnibioai-plugin-rnaseq-analysis:latest
  # ghcr.io/man4ish/omnibioai-plugin-workflow-runner:latest
  # ghcr.io/man4ish/omnibioai-plugin-marker-identification:latest
  # ghcr.io/man4ish/omnibioai-plugin-phenotype-association:latest
  # ghcr.io/man4ish/omnibioai-plugin-variant-annotation:latest

  auth-service:
    image: ghcr.io/man4ish/omnibioai-auth:latest
    build:
      context: /home/manish/Desktop/machine/omnibioai-auth
    ports:
      - "${HOST_IP:-0.0.0.0}:8001:8001"
    environment:
      PYTHONUNBUFFERED: "1"

      DB_HOST: mysql
      DB_PORT: "3306"
      DB_NAME: omnibioai
      DB_USER: root
      DB_PASSWORD: ${MYSQL_ROOT_PASSWORD:-omnibioai}

      SECRET_KEY: ${AUTH_SECRET_KEY:-change-me}

      ACCESS_TOKEN_EXPIRE_MINUTES: "15"
      REFRESH_TOKEN_EXPIRE_DAYS: "7"

      REDIS_URL: redis://redis:6379

    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: on-failure


  policy-engine:
    image: ghcr.io/man4ish/omnibioai-policy-engine:latest
    ports:
      - "${HOST_IP:-0.0.0.0}:8002:8002"
    environment:
      PYTHONUNBUFFERED: "1"
      REDIS_URL: redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy
    restart: on-failure

  hpc-policy-engine:
    image: ghcr.io/man4ish/omnibioai-hpc-policy-engine:latest
    ports:
      - "${HOST_IP:-0.0.0.0}:8003:8003"
    environment:
      PYTHONUNBUFFERED: "1"
      DB_HOST: mysql
      DB_PORT: "3306"
      DB_USER: root
      DB_PASSWORD: ${MYSQL_ROOT_PASSWORD:-omnibioai}
      DB_NAME: ${MYSQL_DEFAULT_DB:-omnibioai}
    depends_on:
      mysql:
        condition: service_healthy
    restart: on-failure

  security-audit:
    image: ghcr.io/man4ish/omnibioai-security-audit:latest
    ports:
      - "${HOST_IP:-0.0.0.0}:8004:8004"
    environment:
      PYTHONUNBUFFERED: "1"
      REDIS_URL: redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy
    restart: on-failure

  api-gateway:
    image: ghcr.io/man4ish/omnibioai-api-gateway:latest
    ports:
      - "${HOST_IP:-0.0.0.0}:8080:8080"
    environment:
      PYTHONUNBUFFERED: "1"
      REDIS_URL: redis://redis:6379
      IAM_URL: http://auth-service:8001
      POLICY_URL: http://policy-engine:8002
      HPC_URL: http://hpc-policy-engine:8003
      AUDIT_URL: http://security-audit:8004
      JWT_SECRET: ${AUTH_SECRET_KEY:-change-me}
      TES_URL: http://tes:8081
      WORKBENCH_URL: http://workbench:8000
      TOOLSERVER_URL: http://toolserver:9090
      RAG_URL: http://rag:8096
    depends_on:
      redis:
        condition: service_healthy
      auth-service:
        condition: service_started
      policy-engine:
        condition: service_started
      hpc-policy-engine:
        condition: service_started
      security-audit:
        condition: service_started
      workbench:
        condition: service_started
      tes:
        condition: service_started
      toolserver:
        condition: service_started
    restart: on-failure

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=7d'
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: omnibioai
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  mysql_data:
  redis_data:
  ollama_data:
  grafana_data:
