services:

  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-omnibioai}
      MYSQL_DATABASE: ${MYSQL_DEFAULT_DB:-omnibioai}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ${DB_INIT_DIR}:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 5s
      timeout: 3s
      retries: 30

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 30

  toolserver:
    image: ghcr.io/man4ish/omnibioai-toolserver:latest
    restart: on-failure
    ports:
      - "${HOST_IP:-0.0.0.0}:9090:9090"
    environment:
      PYTHONUNBUFFERED: "1"
      IAM_URL: http://auth-service:8001
      AUDIT_URL: http://security-audit:8004
    volumes:
      - ${WORKSPACE_HOST}:/workspace
    depends_on:
      mysql:
        condition: service_healthy

  tes:
    image: omnibioai-tes-local
    build:
      context: ${MACHINE_DIR}/omnibioai-tes
      dockerfile: Dockerfile
      target: backend
    restart: on-failure
    ports:
      - "${HOST_IP:-0.0.0.0}:8081:8081"
      - "${HOST_IP:-0.0.0.0}:5177:5177"
    environment:
      HOST: 0.0.0.0
      PORT: "8081"
      PATH: /usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin:/usr/bin/docker
      SENTRY_DSN: ${SENTRY_DSN:-}
      SENTRY_ENVIRONMENT: ${SENTRY_ENVIRONMENT:-beta}
      SENTRY_RELEASE: "0.2.0-beta"
      DOCKER_HOST: unix:///var/run/docker.sock
      PYTHONPATH: /workspace/src
      TOOLSERVER_BASE_URL: http://toolserver:9090
      TES_TOOLS: /workspace/configs/tools
      TES_SERVERS: /workspace/configs/servers
      TMPDIR: /tmp/omnibioai_tes_runs
      IAM_URL: http://auth-service:8001
      POLICY_URL: http://policy-engine:8002
      HPC_POLICY_URL: http://hpc-policy-engine:8003
      AUDIT_URL: http://security-audit:8004
      REDIS_URL: redis://redis:6379
      OMNIBIOAI_EXTRA_MOUNTS: /usr/bin/docker:/usr/bin/singularity:/usr/bin/unsquashfs:/usr/bin/squashfuse:/usr/bin/fusermount:/usr/bin/fusermount3:/lib/aarch64-linux-gnu/libseccomp.so.2:/lib/aarch64-linux-gnu/liblzo2.so.2:/lib/aarch64-linux-gnu/liblzo2.so.2.0.0:/lib/aarch64-linux-gnu/libfuse3.so.3:/lib/aarch64-linux-gnu/libfuse3.so.3.14.0:/etc/singularity:/usr/lib/aarch64-linux-gnu/singularity:/var/lib/singularity:${MACHINE_DIR}/omnibioai-tool-images/sif:${MACHINE_DIR}/omnibioai
      SINGULARITY_CACHEDIR: /tmp/singularity_cache
      SINGULARITY_TMPDIR: /tmp/singularity_tmp
    volumes:
      - ${MACHINE_DIR}/omnibioai-tes:/workspace
      - /var/run/docker.sock:/var/run/docker.sock
      - /usr/bin/docker:/usr/bin/docker:ro
      - /usr/bin/singularity:/usr/bin/singularity:ro
      - /etc/slurm:/etc/slurm:ro
      - /usr/bin/unsquashfs:/usr/bin/unsquashfs:ro
      - /usr/bin/squashfuse:/usr/bin/squashfuse:ro
      - /usr/bin/fusermount:/usr/bin/fusermount:ro
      - /usr/bin/fusermount3:/usr/bin/fusermount3:ro
      - /lib/aarch64-linux-gnu/libseccomp.so.2:/lib/aarch64-linux-gnu/libseccomp.so.2:ro
      - /lib/aarch64-linux-gnu/liblzo2.so.2:/lib/aarch64-linux-gnu/liblzo2.so.2:ro
      - /lib/aarch64-linux-gnu/liblzo2.so.2.0.0:/lib/aarch64-linux-gnu/liblzo2.so.2.0.0:ro
      - /lib/aarch64-linux-gnu/libfuse3.so.3:/lib/aarch64-linux-gnu/libfuse3.so.3:ro
      - /lib/aarch64-linux-gnu/libfuse3.so.3.14.0:/lib/aarch64-linux-gnu/libfuse3.so.3.14.0:ro
      - /usr/lib/aarch64-linux-gnu/singularity:/usr/lib/aarch64-linux-gnu/singularity:ro
      - /var/lib/singularity:/var/lib/singularity:rw
      - /var/run/munge:/var/run/munge:ro
      - /etc/singularity:/etc/singularity:ro
      - ${MACHINE_DIR}/omnibioai-workflow-bundles:${MACHINE_DIR}/omnibioai-workflow-bundles:ro
      - ${MACHINE_DIR}/omnibioai:${MACHINE_DIR}/omnibioai:rw
      - ${MACHINE_DIR}/omnibioai-tool-images:${MACHINE_DIR}/omnibioai-tool-images:ro
      - ${MACHINE_DIR}/data:${MACHINE_DIR}/data
      - ${MACHINE_DIR}/work:${MACHINE_DIR}/work
      - ${DATA_DIR}/tool-images/sif:/sif:ro
    command:
      - bash
      - -lc
      - |
        service nginx start && \
        omnibioai-tes serve \
          --host 0.0.0.0 \
          --port 8081 \
          --tools /workspace/configs/tools \
          --servers /workspace/configs/servers
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      toolserver:
        condition: service_started

  model-registry:
    build:
      context: ${MACHINE_DIR}/omnibioai-model-registry
      dockerfile: Dockerfile
      target: backend
    restart: on-failure
    # image: ghcr.io/man4ish/omnibioai-model-registry:latest
    ports:
      - "${HOST_IP:-0.0.0.0}:8095:8095"
      - "${HOST_IP:-0.0.0.0}:5176:5176"
    environment:
      HOST: 0.0.0.0
      PORT: "8095"
      DB_HOST: mysql
      DB_PORT: "3306"
      DB_USER: root
      DB_PASSWORD: ${MYSQL_ROOT_PASSWORD:-omnibioai}
      DB_NAME: model_registry
      OMNIBIOAI_MODEL_REGISTRY_ROOT: /registry
      IAM_URL: http://auth-service:8001
      AUDIT_URL: http://security-audit:8004
      JWT_SECRET: ${AUTH_SECRET_KEY:-change-me}
      AUTH_ENABLED: "true"

    volumes:
      - ${MACHINE_DIR}/data/local_registry/model_registry:/registry
    depends_on:
      mysql:
        condition: service_healthy

  lims:
    build:
      context: ${MACHINE_DIR}/omnibioai-lims
      dockerfile: Dockerfile
      target: backend
    image: omnibioai-lims-local
    restart: on-failure
    ports:
      - "7000:7000"
    environment:
      DJANGO_SETTINGS_MODULE: lab_data_manager.settings
      DJANGO_ENV: prod
      DJANGO_DEBUG: "true"
      MYSQL_HOST: mysql
      MYSQL_PORT: "3306"
      MYSQL_DATABASE: limsdb
      MYSQL_USER: root
      MYSQL_PASSWORD: ${MYSQL_ROOT_PASSWORD:-omnibioai}
      DJANGO_SECRET_KEY: ${LIMSX_DJANGO_SECRET_KEY:-omnibioai-studio-secret}
      DJANGO_ALLOWED_HOSTS: "127.0.0.1,localhost,lims,0.0.0.0,*"
      CORS_ALLOWED_ORIGINS: "https://app.omnibioai.org,https://lims.omnibioai.org,https://omnibioai.org"
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    volumes:
      - ${MACHINE_DIR}/omnibioai-lims/core:/app/core
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  ollama:
    image: ollama/ollama
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

  rag:
    build:
      context: ${MACHINE_DIR}/omnibioai-rag
      dockerfile: Dockerfile
      target: backend
      args:
        GITHUB_TOKEN: ${GHCR_PULL_TOKEN}      # required: read:packages for @man4ish/ui
        RAGBIO_API_KEY: ${RAGBIO_API_KEY}  # embedded as VITE_RAGBIO_API_KEY in JS bundle
    restart: on-failure
    # image: ghcr.io/man4ish/omnibioai-rag:latest
    # Frontend served at http://localhost:8090/ via nginx (port 5175 inside container)
    ports:
      - "${HOST_IP:-0.0.0.0}:8090:8096"
      - "${HOST_IP:-0.0.0.0}:5175:5175"
    environment:
      HOST: 0.0.0.0
      PORT: "8096"
      OLLAMA_BASE_URL: http://ollama:11434
      IAM_URL: http://auth-service:8001
      GATEWAY_URL: http://api-gateway:8080
      RAGBIO_API_KEY: ${RAGBIO_API_KEY}
      RAGBIO_HOST: 0.0.0.0
      RAG_QUERY_TIMEOUT: "300"
      RAG_LLM_TIMEOUT: "300"
      NCBI_EMAIL: ${NCBI_EMAIL}
      NCBI_API_KEY: ${NCBI_API_KEY}
      RAG_DATA_DIR: /workspace/data/PubMed
      FAISS_INDEX_DIR: /workspace/data/Index
      RAG_QUERY_EXPANSION: "true"
      RAG_RERANKING: "true"
      RAG_RERANKER_MODEL: "cross-encoder/ms-marco-MiniLM-L-6-v2"
    volumes:
      - ${DATA_DIR}/PubMed:/workspace/data/PubMed
      - ${DATA_DIR}/Index:/workspace/data/Index
    depends_on:
      - ollama

  workbench:
    build:
      context: ${MACHINE_DIR}/omnibioai
      dockerfile: Dockerfile.app
      target: backend
    restart: on-failure
    # image: ghcr.io/man4ish/omnibioai-app:latest
    ports:
      - "${HOST_IP:-0.0.0.0}:8000:8000"
    environment:
      DEBUG: "1"
      CSRF_EXTRA_ORIGINS: "http://localhost:5174,http://localhost:8000,http://${HOST_IP:-192.168.86.234}:5174,http://${HOST_IP:-192.168.86.234}:8000"
      DJANGO_SETTINGS_MODULE: omnibioai.settings
      DB_HOST: mysql
      DB_PORT: "3306"
      DB_NAME: omnibioai
      DB_USER: root
      DB_PASSWORD: ${MYSQL_ROOT_PASSWORD:-omnibioai}
      REDIS_HOST: redis
      REDIS_PORT: "6380"
      CELERY_BROKER_URL: redis://redis:6379/1
      TES_BASE_URL: http://tes:8081
      OLLAMA_BASE_URL: http://ollama:11434
      TOOLSERVER_BASE_URL: http://toolserver:9090
      MODEL_REGISTRY_BASE_URL: http://model-registry:8095
      RAG_BASE_URL: http://rag:8096
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      CODE_LLM_MODEL: ${CODE_LLM_MODEL:-qwen2.5-coder:32b}
      REASONING_LLM_MODEL: ${REASONING_LLM_MODEL:-deepseek-r1:32b}
      RAG_LLM_MODEL: ${RAG_LLM_MODEL:-deepseek-r1:32b}
      OMNIBIOAI_TES_URL: http://tes:8081
      OMNIBIOAI_HOST_APP_PREFIX: ${WORKSPACE_HOST}
      OMNIBIOAI_WORK_DIR: ${WORK_DIR}
      OMNI_OBJECT_STORAGE_DIR: /app/work/objects
      OMNI_OBJECT_REGISTRY_PATH: /app/work/object_registry.json
      OMNIBIOAI_RUNS_ROOT: /app/work/runs
      BIOQUERYAI_SANDBOX_SIF: ${MACHINE_DIR}/omnibioai-tool-images/sif/bioqueryai_sandbox.sif
      OMNIBIOAI_MYSQL_HOST: mysql
      GATEWAY_URL: http://api-gateway:8080
      RAGBIO_API_KEY: ${RAGBIO_API_KEY}
      RAGBIO_HOST: 0.0.0.0
      OMNIBIOAI_MYSQL_PORT: "3306"
      OMNIBIOAI_MYSQL_USER: root
      OMNIBIOAI_MYSQL_PASSWORD: ${MYSQL_ROOT_PASSWORD:-omnibioai}
      OMNIBIOAI_MYSQL_DB: omnibioai
      LIMS_BASE_URL: "http://lims:7000"
      LIMS_USERNAME: ${LIMS_USERNAME:-admin}
      LIMS_PASSWORD: ${LIMS_PASSWORD:-omnibioai}
      LIMS_REFRESH_TOKEN: ${LIMS_REFRESH_TOKEN:-}
      LIMS_API_TOKEN: ""
      SENTRY_DSN: ${SENTRY_DSN:-}
      SENTRY_ENVIRONMENT: ${SENTRY_ENVIRONMENT:-beta}
      SENTRY_RELEASE: "0.2.0-beta"
      OMNIBIOAI_HOST_WORK_PREFIX: ${WORK_DIR}
      OMNIBIOAI_ML_TUTORIALS_DIR: /workspace/omnibioai-docs/tutorials/ml
    volumes:
      - ${WORKSPACE_HOST}:/workspace
      - ${MACHINE_DIR}/omnibioai-docs:/workspace/omnibioai-docs:ro
      - ${MACHINE_DIR}/omnibioai-workflow-bundles:/workspace/omnibioai-workflow-bundles:ro
      - ${WORK_DIR}/runs:/app/work/runs
      - ${WORK_DIR}/objects:/app/work/objects
      - ${WORK_DIR}/workflow_runner_exec:/app/work/workflow_runner_exec
      - ${WORK_DIR}/workflow_runner_runs:/app/work/workflow_runner_runs
      - ${WORK_DIR}/pathway_enrichment_runs:/app/work/pathway_enrichment_runs
      - /var/run/docker.sock:/var/run/docker.sock
      - /usr/bin/docker:/usr/bin/docker:ro
      - ${MACHINE_DIR}/data:${MACHINE_DIR}/data
      - ${MACHINE_DIR}/work:${MACHINE_DIR}/work
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      tes:
        condition: service_started
      toolserver:
        condition: service_started
      model-registry:
        condition: service_started
    command: ["bash", "-lc", "python manage.py migrate || (python manage.py migrate --fake-initial && python manage.py migrate) && python manage.py runserver 0.0.0.0:8000 --noreload"]

  celery-worker:
    build:
      context: ${MACHINE_DIR}/omnibioai
      dockerfile: Dockerfile.app
      target: backend
    restart: on-failure
    # image: ghcr.io/man4ish/omnibioai-app:latest
    environment:
      DEBUG: "1"
      CSRF_EXTRA_ORIGINS: "http://localhost:5174,http://localhost:8000,http://${HOST_IP:-192.168.86.234}:5174,http://${HOST_IP:-192.168.86.234}:8000"
      DJANGO_SETTINGS_MODULE: omnibioai.settings
      DB_HOST: mysql
      DB_PORT: "3306"
      DB_NAME: omnibioai
      DB_USER: root
      DB_PASSWORD: ${MYSQL_ROOT_PASSWORD:-omnibioai}
      REDIS_HOST: redis
      REDIS_PORT: "6380"
      CELERY_BROKER_URL: redis://redis:6379/1
      TES_BASE_URL: http://tes:8081
      TOOLSERVER_BASE_URL: http://toolserver:9090
      MODEL_REGISTRY_BASE_URL: http://model-registry:8095
      RAG_BASE_URL: http://rag:8096
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      CODE_LLM_MODEL: ${CODE_LLM_MODEL:-qwen2.5-coder:32b}
      REASONING_LLM_MODEL: ${REASONING_LLM_MODEL:-deepseek-r1:32b}
      RAG_LLM_MODEL: ${RAG_LLM_MODEL:-deepseek-r1:32b}
      OMNIBIOAI_HOST_WORK_PREFIX: ${WORK_DIR}
    volumes:
      - ${WORKSPACE_HOST}:/workspace
      - ${WORK_DIR}/runs:/app/work/runs
      - ${WORK_DIR}/objects:/app/work/objects
      - ${WORK_DIR}/workflow_runner_exec:/app/work/workflow_runner_exec
      - ${WORK_DIR}/workflow_runner_runs:/app/work/workflow_runner_runs
      - ${WORK_DIR}/pathway_enrichment_runs:/app/work/pathway_enrichment_runs
      - /var/run/docker.sock:/var/run/docker.sock
      - /usr/bin/docker:/usr/bin/docker:ro
    depends_on:
      workbench:
        condition: service_started
    command: ["bash", "-lc", "celery -A omnibioai worker -l info"]

  control-center:
    build:
      context: ${MACHINE_DIR}/omnibioai-control-center
      dockerfile: Dockerfile
      target: backend
    restart: on-failure
    # image: ghcr.io/man4ish/omnibioai-control-center:latest
    ports:
      # Bound to localhost only — blocks all external network access
      # generate_report.py can still reach it via 127.0.0.1:7070 on the host
      # All browser/API access goes through nginx /_svc/control (JWT required)
      # Prometheus scrapes via Docker internal network (unaffected)
      - "127.0.0.1:7070:7070"
    environment:
      WORKSPACE_ROOT: /workspace
      WORK_DIR: /workspace/omnibioai-work
      OMNIBIOAI_BASE: /workspace/omnibioai
      TOOL_IMAGES_BASE: /workspace/omnibioai-tool-images
      SENTRY_DSN: ${SENTRY_DSN:-}
      SENTRY_ENVIRONMENT: ${SENTRY_ENVIRONMENT:-beta}
      SENTRY_RELEASE: "0.2.0-beta"
      REPORT_SCHEDULE_HOURS: ${REPORT_SCHEDULE_HOURS:-6}
    volumes:
      - ${MACHINE_DIR}:/workspace
      - /var/run/docker.sock:/var/run/docker.sock
      - /usr/bin/docker:/usr/bin/docker:ro
      - ${MACHINE_DIR}/omnibioai-control-center/backend/src:/app/src
      - ${MACHINE_DIR}/omnibioai-control-center/scripts:/app/scripts
      - ${MACHINE_DIR}/omnibioai-control-center/frontend/cc-ui/dist:/app/dist
      - ${MACHINE_DIR}/omnibioai-control-center/config:/config:ro
      - ${MACHINE_DIR}/omnibioai-tool-images/sif:/workspace/omnibioai-tool-images/sif:ro
    command: >-
      sh -c "/usr/local/bin/pip install -q pytest pytest-cov pandas pytest-django django-environ django-extensions djangorestframework 2>&1 | grep -v '^Requirement' || true &&
      exec /usr/local/bin/uvicorn control_center.main:app --host 0.0.0.0 --port 7070"
    depends_on:
      - workbench
      - tes
      - toolserver

  dev-hub:
    build:
      context: ${MACHINE_DIR}/omnibioai-dev-hub
      dockerfile: Dockerfile
      target: backend
    ports:
      - "${HOST_IP:-0.0.0.0}:5173:5173"
      - "${HOST_IP:-0.0.0.0}:8082:8082"
    environment:
      PYTHONUNBUFFERED: "1"
      PYTHONPATH: /app
      OLLAMA_URL: http://ollama:11434/api
      OLLAMA_HOST: http://ollama:11434
      REPO_BASE: /repos
    volumes:
      - ${MACHINE_DIR}/omnibioai-dev-hub/data:/app/data
      - ${MACHINE_DIR}/omnibioai:/repos/omnibioai:ro
      - ${MACHINE_DIR}/data:${MACHINE_DIR}/data
      - ${MACHINE_DIR}/work:${MACHINE_DIR}/work
      - ${MACHINE_DIR}/omnibioai-rag:/repos/omnibioai-rag:ro
      - ${MACHINE_DIR}/omnibioai-toolserver:/repos/omnibioai-toolserver:ro
      - ${MACHINE_DIR}/omnibioai-sdk:/repos/omnibioai-sdk:ro
      - ${MACHINE_DIR}/omnibioai-workflow-bundles:/repos/omnibioai-workflow-bundles:ro
      - ${MACHINE_DIR}/omnibioai-control-center:/repos/omnibioai-control-center:ro
      - ${MACHINE_DIR}/omnibioai-lims:/repos/omnibioai-lims:ro
      - ${MACHINE_DIR}/omnibioai-model-registry:/repos/omnibioai-model-registry:ro
      - ${MACHINE_DIR}/omnibioai-dev-docker:/repos/omnibioai-dev-docker:ro
      - ${MACHINE_DIR}/omnibioai-docs:/repos/omnibioai-docs:ro
      - ${MACHINE_DIR}/omnibioai-studio:/repos/omnibioai-studio:ro
      - ${MACHINE_DIR}/omnibioai-api-gateway:/repos/omnibioai-api-gateway:ro
      - ${MACHINE_DIR}/omnibioai-auth:/repos/omnibioai-auth:ro
      - ${MACHINE_DIR}/omnibioai-tool-runtime:/repos/omnibioai-tool-runtime:ro
      - ${MACHINE_DIR}/omnibioai-iam-client:/repos/omnibioai-iam-client:ro
      - ${MACHINE_DIR}/omnibioai-policy-engine:/repos/omnibioai-policy-engine:ro
      - ${MACHINE_DIR}/omnibioai-security-sdk:/repos/omnibioai-security-sdk:ro
    depends_on:
      - ollama
    restart: on-failure

  launcher:
    build:
      context: ${MACHINE_DIR}/omnibioai-launcher
      dockerfile: Dockerfile
    ports:
      - "${HOST_IP:-0.0.0.0}:5190:5190"
    environment:
      REACT_APP_OMNIBIOAI_BASE_URL: ${OMNIBIOAI_BASE_URL:-http://192.168.86.234:8000}
      REACT_APP_OMNIBIOAI_TOKEN: ${OMNIBIOAI_TOKEN:-dev}
      REACT_APP_JUPYTER_BASE: ${JUPYTER_BASE:-http://192.168.86.234:8890}
      REACT_APP_JUPYTER_TOKEN: ${JUPYTER_TOKEN:-devtoken}
      REACT_APP_USE_MOCK: "false"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /usr/bin/docker:/usr/bin/docker:ro
    depends_on:
      workbench:
        condition: service_started

  jupyter:
    image: ghcr.io/man4ish/omnibioai-jupyter:1.0
    container_name: omnibioai-jupyter
    ports:
      - "${HOST_IP:-0.0.0.0}:8888:8888"
    volumes:
      - ${MACHINE_DIR}/data:${MACHINE_DIR}/data
      - ${MACHINE_DIR}/work:${MACHINE_DIR}/work
    environment:
      - JUPYTER_TOKEN=${JUPYTER_TOKEN:-omnibioai}
      - GRANT_SUDO=yes
    restart: unless-stopped
    depends_on:
      workbench:
        condition: service_started

  rstudio:
    image: ghcr.io/man4ish/omnibioai-rstudio:1.0
    container_name: omnibioai-rstudio
    ports:
      - "${HOST_IP:-0.0.0.0}:8787:8787"
    volumes:
      - ${MACHINE_DIR}/data:${MACHINE_DIR}/data
      - ${MACHINE_DIR}/work:${MACHINE_DIR}/work
    environment:
      - PASSWORD=${RSTUDIO_PASSWORD:-omnibioai}
      - ROOT=TRUE
    restart: unless-stopped
    depends_on:
      workbench:
        condition: service_started

  vscode:
    image: ghcr.io/man4ish/omnibioai-vscode:1.0
    container_name: omnibioai-vscode
    ports:
      - "${HOST_IP:-0.0.0.0}:8083:8080"
    volumes:
      - ${MACHINE_DIR}/data:${MACHINE_DIR}/data
      - ${MACHINE_DIR}/work:${MACHINE_DIR}/work
    environment:
      - PASSWORD=${VSCODE_PASSWORD:-omnibioai}
    restart: unless-stopped
    depends_on:
      workbench:
        condition: service_started

  workflow-bundles:
    build:
      context: ${MACHINE_DIR}/omnibioai-workflow-bundles
      dockerfile: Dockerfile
      target: backend
    # image: ghcr.io/man4ish/omnibioai-workflow-bundles:latest
    ports:
      - "${HOST_IP:-0.0.0.0}:8098:8098"
      - "${HOST_IP:-0.0.0.0}:5178:5178"
    environment:
      PYTHONUNBUFFERED: "1"
      DB_HOST: mysql
      DB_PORT: "3306"
      DB_NAME: omnibioai
      DB_USER: root
      DB_PASSWORD: ${MYSQL_ROOT_PASSWORD:-omnibioai}
    depends_on:
      mysql:
        condition: service_healthy
    restart: on-failure

  tool-images:
    build:
      context: ${MACHINE_DIR}/omnibioai-tool-images
      dockerfile: Dockerfile
      target: backend
    # image: ghcr.io/man4ish/omnibioai-tool-images:latest
    ports:
      - "${HOST_IP:-0.0.0.0}:8097:8097"
      - "${HOST_IP:-0.0.0.0}:5179:5179"
    environment:
      PYTHONUNBUFFERED: "1"
    volumes:
      - ${MACHINE_DIR}/omnibioai-tool-images/dockerfiles:/app/dockerfiles:ro
      - ${MACHINE_DIR}/omnibioai-tool-images/sif:/app/sif:ro
      - ${MACHINE_DIR}/omnibioai-tool-images/build_logs:/app/build_logs:ro
    restart: on-failure

  videos:
    image: ghcr.io/man4ish/omnibioai-videos:latest
    restart: on-failure
    ports:
      - "8086:8086"
    volumes:
      - ${VIDEO_DIR}:/videos:ro

  opa:
    image: openpolicyagent/opa:latest
    restart: on-failure
    ports:
      - "8181:8181"
    command: ["run", "--server", "--addr=0.0.0.0:8181"]

  # Plugin images (pulled on-demand by TES, not persistent services):
  # ghcr.io/man4ish/omnibioai-plugin-scanpy:latest
  # ghcr.io/man4ish/omnibioai-plugin-fastq-qc:latest
  # ghcr.io/man4ish/omnibioai-plugin-fastq-trimmer:latest
  # ghcr.io/man4ish/omnibioai-plugin-rnaseq-analysis:latest
  # ghcr.io/man4ish/omnibioai-plugin-workflow-runner:latest
  # ghcr.io/man4ish/omnibioai-plugin-marker-identification:latest
  # ghcr.io/man4ish/omnibioai-plugin-phenotype-association:latest
  # ghcr.io/man4ish/omnibioai-plugin-variant-annotation:latest

  auth-service:
    image: ghcr.io/man4ish/omnibioai-auth:latest
    build:
      context: ${MACHINE_DIR}/omnibioai-auth
    ports:
      - "${HOST_IP:-0.0.0.0}:8001:8001"
    environment:
      PYTHONUNBUFFERED: "1"

      DB_HOST: mysql
      DB_PORT: "3306"
      DB_NAME: omnibioai
      DB_USER: root
      DB_PASSWORD: ${MYSQL_ROOT_PASSWORD:-omnibioai}

      SECRET_KEY: ${AUTH_SECRET_KEY:-change-me}

      ACCESS_TOKEN_EXPIRE_MINUTES: "15"
      REFRESH_TOKEN_EXPIRE_DAYS: "7"

      REDIS_URL: redis://redis:6379

    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: on-failure


  policy-engine:
    build:
      context: ${MACHINE_DIR}
      dockerfile: omnibioai-policy-engine/Dockerfile
    image: omnibioai-policy-engine-local
    ports:
      - "${HOST_IP:-0.0.0.0}:8002:8002"
    environment:
      PYTHONUNBUFFERED: "1"
      REDIS_URL: redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy
    restart: on-failure

  hpc-policy-engine:
    build:
      context: ${MACHINE_DIR}/omnibioai-hpc-policy-engine
      dockerfile: Dockerfile
    image: omnibioai-hpc-policy-engine-local
    ports:
      - "${HOST_IP:-0.0.0.0}:8003:8003"
    environment:
      PYTHONUNBUFFERED: "1"
      DB_HOST: mysql
      DB_PORT: "3306"
      DB_USER: root
      DB_PASSWORD: ${MYSQL_ROOT_PASSWORD:-omnibioai}
      DB_NAME: ${MYSQL_DEFAULT_DB:-omnibioai}
    depends_on:
      mysql:
        condition: service_healthy
    restart: on-failure

  security-audit:
    image: ghcr.io/man4ish/omnibioai-security-audit:latest
    ports:
      - "${HOST_IP:-0.0.0.0}:8004:8004"
    environment:
      PYTHONUNBUFFERED: "1"
      REDIS_URL: redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy
    restart: on-failure

  api-gateway:
    image: ghcr.io/man4ish/omnibioai-api-gateway:latest
    ports:
      - "${HOST_IP:-0.0.0.0}:8080:8080"
    environment:
      PYTHONUNBUFFERED: "1"
      REDIS_URL: redis://redis:6379
      IAM_URL: http://auth-service:8001
      POLICY_URL: http://policy-engine:8002
      HPC_URL: http://hpc-policy-engine:8003
      AUDIT_URL: http://security-audit:8004
      JWT_SECRET: ${AUTH_SECRET_KEY:-change-me}
      TES_URL: http://tes:8081
      WORKBENCH_URL: http://workbench:8000
      TOOLSERVER_URL: http://toolserver:9090
      RAG_URL: http://rag:8096
      MODEL_REGISTRY_URL: http://model-registry:8095
    depends_on:
      redis:
        condition: service_healthy
      auth-service:
        condition: service_started
      policy-engine:
        condition: service_started
      hpc-policy-engine:
        condition: service_started
      security-audit:
        condition: service_started
      workbench:
        condition: service_started
      tes:
        condition: service_started
      toolserver:
        condition: service_started
    restart: on-failure

  prometheus:
    image: prom/prometheus:latest
    # ports:          # removed — access only via nginx /_svc/prometheus
    #   - "9091:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=7d'
      - '--web.external-url=http://localhost/_svc/prometheus'
      - '--web.route-prefix=/'
    restart: unless-stopped

  # ── grafana ──────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GF_ADMIN_PASSWORD:-omnibioai}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_USERS_DEFAULT_THEME: "dark"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_PATHS_DATA: /var/lib/grafana
      GF_PATHS_LOGS: /var/log/grafana
      GF_PATHS_PLUGINS: /var/lib/grafana/plugins
      GF_PATHS_PROVISIONING: /etc/grafana/provisioning
      GF_SECURITY_COOKIE_SAMESITE: lax
      GF_SECURITY_COOKIE_SECURE: "false"
      GF_AUTH_PROXY_ENABLED: "false"
      GF_SECURITY_CSRF_TRUSTED_ORIGINS: "localhost"
      GF_SECURITY_CSRF_ADDITIONAL_HEADERS: "X-Requested-With"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
      - ./monitoring/grafana/dashboards:/etc/grafana/dashboards
      # Theme CSS — loaded last by our patched index.html
      - ./monitoring/grafana/custom.css:/usr/share/grafana/public/build/custom.css:ro
      # Patched index.html — re-injects custom.css after emotion runs  ← ADD THIS
      - ./monitoring/grafana/index.html:/usr/share/grafana/public/views/index.html:ro
      # Replace login background images with solid #0f1117 to kill the purple gradient
      - ./monitoring/grafana/login-bg.png:/usr/share/grafana/public/img/bg/p0.png:ro
      - ./monitoring/grafana/login-bg.png:/usr/share/grafana/public/img/bg/p1.png:ro
      - ./monitoring/grafana/login-bg.png:/usr/share/grafana/public/img/bg/p2.png:ro
      - ./monitoring/grafana/login-bg.png:/usr/share/grafana/public/img/bg/p3.png:ro
      - ./monitoring/grafana/login-bg.png:/usr/share/grafana/public/img/bg/p4.png:ro
      - ./monitoring/grafana/login-bg.png:/usr/share/grafana/public/img/bg/p5.png:ro
      - ./monitoring/grafana/login-bg.png:/usr/share/grafana/public/img/bg/p6.png:ro
      - ./monitoring/grafana/login-bg.png:/usr/share/grafana/public/img/background_tease.jpg:ro
    depends_on:
      - prometheus
    restart: unless-stopped

  license-server:
    build:
      context: ./backend
      dockerfile: Dockerfile.license
    ports:
      - "8099:8099"
    environment:
      LICENSE_SECRET: ${LICENSE_SECRET:-omnibioai-secret-change-in-production}
      ADMIN_KEY: ${ADMIN_KEY:-admin-secret}
      GHCR_PULL_TOKEN: ${GHCR_PULL_TOKEN:-}
      MYSQL_HOST: mysql
      MYSQL_PORT: "3306"
      MYSQL_USER: ${MYSQL_USER:-root}
      MYSQL_PASSWORD: ${MYSQL_ROOT_PASSWORD:-omnibioai}
      MYSQL_DATABASE: omnibioai_licenses
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - default

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: omnibioai-cadvisor
    privileged: true
    devices:
      - /dev/kmsg:/dev/kmsg
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
      - /cgroup:/cgroup:ro
    ports:
      - "8585:8080"
    restart: unless-stopped

  redis-exporter:
    image: oliver006/redis_exporter:latest
    container_name: omnibioai-redis-exporter
    environment:
      REDIS_ADDR: redis://redis:6379
    ports:
      - "9121:9121"
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  nginx-router:
    image: nginx:latest
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx-router.conf:/etc/nginx/conf.d/default.conf:ro
      - ${MACHINE_DIR}/omnibioai-docs:/docs:ro
      - ./docker/static:/etc/nginx/omni-static:ro
    depends_on:
      - workbench
      - lims
      - rag
      - api-gateway
      - auth-service
      - control-center
      - grafana
      - videos
      - launcher
      - model-registry
      - workflow-bundles
      - tool-images
      - dev-hub
      - tes
      - toolserver
      - opa
      - jupyter
      - rstudio
      - vscode
      - cadvisor
      - redis-exporter
    restart: unless-stopped

volumes:
  mysql_data:
  redis_data:
  ollama_data:
  grafana_data:
