<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />

    <title>OmniBioAI Studio</title>

    <!-- Prevent Electron CSP issues in production -->
    <meta http-equiv="Content-Security-Policy" content="
      default-src 'self';
      script-src 'self';
      style-src 'self' 'unsafe-inline';
      img-src 'self' data:;
      connect-src 'self' http://localhost:5173 http://127.0.0.1:*;
    " />

    <style>
      /* Basic loading screen (important for DMG startup UX) */
      #loader {
        font-family: system-ui, sans-serif;
        display: flex;
        height: 100vh;
        align-items: center;
        justify-content: center;
        flex-direction: column;
      }

      .spinner {
        width: 40px;
        height: 40px;
        border: 4px solid #ccc;
        border-top: 4px solid #000;
        border-radius: 50%;
        animation: spin 1s linear infinite;
        margin-bottom: 10px;
      }

      @keyframes spin {
        100% {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>

  <body>
    <div id="root">
      <!-- Fallback loading UI (important for DMG startup experience) -->
      <div id="loader">
        <div class="spinner"></div>
        <div>Starting OmniBioAI Studio...</div>
      </div>
    </div>

    <!-- Vite entry point -->
    <script type="module" src="/src/ui/main.jsx"></script>
  </body>
</html>
