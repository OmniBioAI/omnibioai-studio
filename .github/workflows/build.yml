name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
      - run: npm install
      - run: npm run build:linux
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PUBLISH: never
      - uses: actions/upload-artifact@v4
        with:
          name: linux-appimage
          path: release/*.AppImage

  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
      - run: npm install
      - run: npx electron-builder --mac dmg --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/upload-artifact@v4
        with:
          name: mac-dmg
          path: release/*.dmg

  release:
    needs: [build-linux, build-mac]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: linux-appimage
          path: artifacts/linux

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: mac-dmg
          path: artifacts/mac

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "OmniBioAI Studio ${{ github.ref_name }}"
          prerelease: true
          body: |
            ## OmniBioAI Studio ${{ github.ref_name }}

            ### Downloads
            | Platform | File | Notes |
            |----------|------|-------|
            | Linux    | `.AppImage` | Works on any Linux distro |
            | macOS    | `.dmg` | Intel + Apple Silicon |

            ### Requirements
            - Docker + Docker Compose
            - 8GB RAM minimum

            ### What's New
            - Enterprise dark UI
            - Mode / LLM / Cloud / HPC / Launch / Services / Logs / Settings
            - Live Docker health monitoring
            - Real-time log streaming
          files: |
            artifacts/linux/*.AppImage
            artifacts/mac/*.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
