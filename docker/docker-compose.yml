version: "3.9"

services:

  # ─────────────────────────────
  # CORE DATA LAYER
  # ─────────────────────────────

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: omnibioai
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  # ─────────────────────────────
  # CONTROL PLANE
  # ─────────────────────────────

  workbench:
    image: ghcr.io/omnibioai/omnibioai-workbench:beta
    ports:
      - "8000:8000"
    environment:
      DB_HOST: mysql
      REDIS_HOST: redis
    depends_on:
      - mysql
      - redis

  tes:
    image: ghcr.io/omnibioai/omnibioai-tes:beta
    ports:
      - "8081:8081"
    environment:
      TOOLSERVER_URL: http://toolserver:9090
    depends_on:
      - toolserver
      - redis
      - mysql

  toolserver:
    image: ghcr.io/omnibioai/omnibioai-toolserver:beta
    ports:
      - "9090:9090"
    depends_on:
      - mysql

  model-registry:
    image: ghcr.io/omnibioai/omnibioai-model-registry:beta
    ports:
      - "8095:8095"
    environment:
      DB_HOST: mysql
    depends_on:
      - mysql

  lims:
    image: ghcr.io/omnibioai/omnibioai-lims:beta
    ports:
      - "7000:7000"
    environment:
      DB_HOST: mysql
    depends_on:
      - mysql

  control-center:
    image: ghcr.io/omnibioai/omnibioai-control-center:beta
    ports:
      - "7070:7070"
    depends_on:
      - workbench
      - tes
      - toolserver

  # ─────────────────────────────
  # AI LAYER
  # ─────────────────────────────

  ollama:
    image: ollama/ollama
    ports:
      - "11434:11434"

  rag:
    image: ghcr.io/omnibioai/omnibioai-rag:beta
    ports:
      - "8500:8500"
    environment:
      OLLAMA_URL: http://ollama:11434
    depends_on:
      - ollama

  # ─────────────────────────────
  # POLICY ENGINE (CRITICAL FOR ENTERPRISE)
  # ─────────────────────────────

  opa:
    image: openpolicyagent/opa:latest
    ports:
      - "8181:8181"
    command: ["run", "--server"]

  # ─────────────────────────────
  # OPTIONAL SDK SERVICE (IMPORTANT CLARITY)
  # ─────────────────────────────
  sdk-service:
    image: ghcr.io/omnibioai/omnibioai-sdk:beta
    ports:
      - "9000:9000"
    environment:
      WORKBENCH_URL: http://workbench:8000
    depends_on:
      - workbench

volumes:
  mysql_data:
  redis_data: