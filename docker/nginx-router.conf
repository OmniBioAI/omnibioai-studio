##
## OmniBioAI nginx-router.conf — v2
## Changes from v1:
##   - Uses nginxinc/nginx-unprivileged or nginx:alpine (sub_filter built in on mainline)
##   - Prometheus theme injection via sub_filter on /_svc/prometheus route
##   - Static OmniBioAI theme assets at /_omni-static/
##   - Grafana proxied at /_svc/monitor (unchanged)
##

limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=10r/m;

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

upstream workbench     { server workbench:8000; }
upstream lims          { server lims:7000; }
upstream rag           { server rag:8096; }
upstream gateway       { server api-gateway:8080; }
upstream auth          { server auth-service:8001; }
upstream policy        { server policy-engine:8002; }
upstream hpc           { server hpc-policy-engine:8003; }
upstream audit         { server security-audit:8004; }
upstream control       { server control-center:7070; }
upstream grafana       { server grafana:3000; }
upstream videos        { server videos:8086; }
upstream launcher      { server launcher:5190; }
upstream modelregistry { server model-registry:8095; }
upstream workflows     { server workflow-bundles:8098; }
upstream workflows-ui  { server workflow-bundles:5178; }
upstream toolimages    { server tool-images:8097; }
upstream devhub        { server dev-hub:8082; }
upstream tes           { server tes:5177; }
upstream opa           { server opa:8181; }
upstream toolserver    { server toolserver:9090; }
upstream prometheus    { server prometheus:9090; }
upstream jupyter       { server jupyter:8888; }
upstream rstudio       { server rstudio:8787; }
upstream vscode        { server vscode:8080; }

server {
    listen 80;
    server_name _;

    client_max_body_size 10G;
    proxy_read_timeout    300s;
    proxy_send_timeout    300s;
    proxy_connect_timeout  10s;

    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_http_version 1.1;
    proxy_set_header Upgrade    $http_upgrade;
    proxy_set_header Connection $connection_upgrade;

    # ── Health check ──────────────────────────────────────────────────────────
    location = /_health {
        return 200 '{"status":"ok","router":"nginx"}';
        add_header Content-Type application/json;
    }

    # ── OmniBioAI static theme assets ─────────────────────────────────────────
    # Volume mount required in docker-compose nginx-router service:
    #   - ./docker/static:/etc/nginx/omni-static:ro
    location ^~ /_omni-static/ {
        alias /etc/nginx/omni-static/;
        expires 1h;
        add_header Cache-Control "public, max-age=3600";
        add_header Access-Control-Allow-Origin "*";
        default_type text/css;
    }

    # ── Prometheus — OmniBioAI theme injection ────────────────────────────────
    # sub_filter rewrites HTML responses to inject the theme CSS.
    # IMPORTANT: proxy_set_header Accept-Encoding "" prevents gzip so
    # nginx can read and rewrite the HTML body.
    # NOTE: this requires nginx built with ngx_http_sub_module.
    # Use image: nginx:latest (not alpine) in docker-compose — it includes sub_filter.
    location = /_svc/prometheus {
        return 301 /_svc/prometheus/graph;
    }
    location ^~ /_svc/prometheus/ {
        rewrite ^/_svc/prometheus(/.*)$ $1 break;
        proxy_pass http://prometheus;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Accept-Encoding "";

        sub_filter_once  on;
        sub_filter '</head>' '<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=JetBrains+Mono&display=swap" rel="stylesheet"><link rel="stylesheet" href="/_omni-static/prometheus-theme.css"></head>';
    }

    # ── Service routes ────────────────────────────────────────────────────────
    location ^~ /_svc/gateway     { rewrite ^/_svc/gateway(/.*)$     $1 break; proxy_pass http://gateway; }
    location ^~ /docs/ {
        alias /docs/;
        index getting-started.html index.html;
        autoindex on;
        default_type text/plain;
    }
    location ^~ /_svc/workbench   { rewrite ^/_svc/workbench(/.*)$   $1 break; proxy_pass http://workbench; }
    location ^~ /_svc/lims        { rewrite ^/_svc/lims(/.*)$        $1 break; proxy_pass http://lims; }
    location = /_svc/rag {
        return 301 /_svc/rag/;
    }
    location ^~ /_svc/rag/ {
        proxy_pass http://rag/;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        sub_filter 'src="./assets/' 'src="/_svc/rag/assets/';
        sub_filter 'href="./assets/' 'href="/_svc/rag/assets/';
        sub_filter_once off;
        sub_filter_types text/html;
    }
    location ^~ /_svc/modelregistry { rewrite ^/_svc/modelregistry(/.*)$ $1 break; proxy_pass http://modelregistry; }
    location ^~ /_svc/workflows/v1  { rewrite ^/_svc/workflows(/.*)?$ /$1 break; proxy_pass http://workflows; }
    location ^~ /_svc/workflows      { rewrite ^/_svc/workflows(/.*)?$ /$1 break; proxy_pass http://workflows-ui; }
    location ^~ /_svc/toolimages  { rewrite ^/_svc/toolimages(/.*)$  $1 break; proxy_pass http://toolimages; }
    location ^~ /_svc/devhub      { rewrite ^/_svc/devhub(/.*)$      $1 break; proxy_pass http://devhub; }
    location ^~ /_svc/tes         { rewrite ^/_svc/tes(/.*)$         $1 break; proxy_pass http://tes; }
    location ^~ /_svc/sdk         { rewrite ^/_svc/sdk(/.*)$         $1 break; proxy_pass http://launcher; }
    location ^~ /_svc/videos      { rewrite ^/_svc/videos(/.*)$      $1 break; proxy_pass http://videos; }
    # Control center — public read-only endpoints (no JWT required)
    # These are needed by the ecosystem report health tab and generate_report.py
    location ~* ^/_svc/control/(health|summary|services|report|report/data)$ {
        rewrite ^/_svc/control(/.*)$ $1 break;
        proxy_pass http://control;
    }

    # Control center — all other endpoints require JWT
    location /_svc/control {
        auth_request      /internal/auth/verify;
        auth_request_set  $auth_status $upstream_status;
        error_page 401 = @cc_unauthorized;
        rewrite ^/_svc/control(/.*)$ $1 break;
        proxy_pass http://control;
    }
    location ^~ /_svc/monitor {
        rewrite ^/_svc/monitor(/.*)$ $1 break;
        proxy_pass http://grafana;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_pass_header Set-Cookie;
        proxy_cookie_path / "/; SameSite=Lax";
    }
    location ^~ /_svc/toolserver  { rewrite ^/_svc/toolserver(/.*)$  $1 break; proxy_pass http://toolserver; }
    location ^~ /_svc/auth {
        limit_req zone=auth_limit burst=5 nodelay;
        rewrite ^/_svc/auth(/.*)$ $1 break;
        proxy_pass http://auth;
    }
    location ^~ /_svc/policy {
        rewrite ^/_svc/policy/?(.*)$ /$1 break;
        proxy_pass http://policy;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_buffering off;
    }
    location ^~ /_svc/hpc {
        rewrite ^/_svc/hpc/?(.*)$ /$1 break;
        proxy_pass http://hpc;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_buffering off;
    }
    location ^~ /_svc/audit  { rewrite ^/_svc/audit(/.*)$  $1 break; proxy_pass http://audit; }
    location ^~ /_svc/opa    { rewrite ^/_svc/opa(/.*)$    $1 break; proxy_pass http://opa; }

    # ── IDE services ──────────────────────────────────────────────────────────
    location /jupyter/ {
        proxy_pass http://jupyter/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
    location /rstudio/ { proxy_pass http://rstudio/; }
    location /vscode/ {
        proxy_pass http://vscode/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    location / { proxy_pass http://workbench; }

    # Internal subrequest — strips body, forwards Authorization header only
    location = /internal/auth/verify {
        internal;
        proxy_pass              http://gateway/auth/verify;
        proxy_pass_request_body off;
        proxy_set_header        Content-Length "";
        proxy_set_header        X-Original-URI $request_uri;
        proxy_set_header        Authorization $http_authorization;
    }

    location @cc_unauthorized {
        default_type application/json;
        return 401 '{"error":"unauthorized","message":"Valid JWT required to access Control Center"}';
    }
}
