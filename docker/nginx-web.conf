##
## Nginx for the omnibioai-web container ONLY — serves the built React SPA
## (dist/web) as static files with client-side-routing fallback.
##
## Deliberately does NOT proxy /auth, /_svc/*, or anything backend-related:
## that's docker/nginx-router.conf's job (the outer router in front of this
## container and every other service). Duplicating those routes here with
## different upstream names was the mistake in an earlier draft of this
## file — auth-service is reachable at auth-service:8001 and api-gateway at
## api-gateway:8080 per docker-compose.yml, never at the auth:8002 /
## api-gateway:8888 names/ports a prior version of this file guessed at.
##

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location = /_health {
        return 200 '{"status":"ok","service":"omnibioai-web"}';
        add_header Content-Type application/json;
    }

    # SPA client-side routing fallback.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long-cache hashed build assets; index.html itself falls through to the
    # default (uncached) location above so deploys are picked up immediately.
    location ~* \.(?:js|css|woff2?|ttf|svg|png|jpg|jpeg|gif|ico)$ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
